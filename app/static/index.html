<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftLink - URL Shortener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background-color: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background-color: #1a1a2e;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid #2a2a4a;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 14px;
            color: #888;
            margin-top: 6px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .input-group input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #2a2a4a;
            background-color: #16162a;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #6c5ce7;
        }

        .input-group input::placeholder {
            color: #555;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
            min-width: 110px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background-color: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .result {
            background-color: #16162a;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .result-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 10px;
        }

        .result-url {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .result-url a {
            flex: 1;
            color: #a855f7;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            word-break: break-all;
        }

        .result-url a:hover {
            text-decoration: underline;
        }

        .btn-copy {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #2a2a4a;
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            white-space: nowrap;
        }

        .btn-copy:hover {
            background-color: #2a2a4a;
            border-color: #6c5ce7;
        }

        .btn-copy.copied {
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .stats {
            display: flex;
            gap: 20px;
            padding-top: 16px;
            border-top: 1px solid #2a2a4a;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-item .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
        }

        .stat-item .value {
            font-size: 14px;
            color: #ccc;
        }

        .original-url {
            font-size: 13px;
            color: #666;
            margin-bottom: 16px;
            word-break: break-all;
        }

        @media (max-width: 560px) {
            .card {
                margin: 16px;
                padding: 32px 24px;
            }
            .input-group {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="48" height="48" rx="12" fill="#6c5ce7" fill-opacity="0.15"/>
                <path d="M20 16l-6 8 6 8M28 16l6 8-6 8M26 14l-4 20" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1>SwiftLink</h1>
            <p>Fast &amp; simple URL shortener</p>
        </div>

        <div class="error" id="error"></div>

        <div class="input-group">
            <input type="url" id="urlInput" placeholder="Paste your long URL here..." autocomplete="off">
            <button class="btn" id="shortenBtn" onclick="shortenUrl()">Shorten</button>
        </div>

        <div class="result" id="result">
            <div class="result-label">Shortened URL</div>
            <div class="result-url">
                <a id="shortUrl" href="#" target="_blank" rel="noopener"></a>
                <button class="btn-copy" id="copyBtn" onclick="copyUrl()">Copy</button>
            </div>
            <div class="original-url" id="originalUrl"></div>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">Clicks</span>
                    <span class="value" id="clickCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Created</span>
                    <span class="value" id="createdAt">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const urlInput = document.getElementById('urlInput');
        const shortenBtn = document.getElementById('shortenBtn');
        const errorEl = document.getElementById('error');
        const resultEl = document.getElementById('result');
        const shortUrlEl = document.getElementById('shortUrl');
        const originalUrlEl = document.getElementById('originalUrl');
        const clickCountEl = document.getElementById('clickCount');
        const createdAtEl = document.getElementById('createdAt');
        const copyBtn = document.getElementById('copyBtn');

        let currentShortCode = null;

        urlInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') shortenUrl();
        });

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            resultEl.style.display = 'none';
        }

        function hideError() {
            errorEl.style.display = 'none';
        }

        function setLoading(loading) {
            shortenBtn.disabled = loading;
            shortenBtn.innerHTML = loading
                ? '<span class="spinner"></span>'
                : 'Shorten';
        }

        async function shortenUrl() {
            const url = urlInput.value.trim();
            hideError();

            if (!url) {
                showError('Please enter a URL.');
                return;
            }

            try {
                new URL(url);
            } catch {
                showError('Please enter a valid URL (e.g. https://example.com).');
                return;
            }

            setLoading(true);

            try {
                const resp = await fetch(`${API_BASE}/shorten`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url }),
                });

                if (!resp.ok) {
                    const data = await resp.json().catch(() => null);
                    const detail = data?.detail || `Server error (${resp.status})`;
                    showError(typeof detail === 'string' ? detail : JSON.stringify(detail));
                    return;
                }

                const data = await resp.json();
                currentShortCode = data.short_code;

                const shortUrl = `${API_BASE}/${data.short_code}`;
                shortUrlEl.textContent = shortUrl;
                shortUrlEl.href = shortUrl;
                originalUrlEl.textContent = data.original_url;

                await fetchStats(data.short_code);

                resultEl.style.display = 'block';
                copyBtn.textContent = 'Copy';
                copyBtn.classList.remove('copied');
            } catch (err) {
                showError('Could not connect to the server. Please try again.');
            } finally {
                setLoading(false);
            }
        }

        async function fetchStats(code) {
            try {
                const resp = await fetch(`${API_BASE}/stats/${code}`);
                if (resp.ok) {
                    const data = await resp.json();
                    clickCountEl.textContent = data.click_count;
                    if (data.created_at) {
                        const date = new Date(data.created_at);
                        createdAtEl.textContent = date.toLocaleDateString('en-US', {
                            month: 'short', day: 'numeric', year: 'numeric',
                            hour: '2-digit', minute: '2-digit',
                        });
                    }
                }
            } catch {
                clickCountEl.textContent = '0';
                createdAtEl.textContent = '-';
            }
        }

        async function copyUrl() {
            const url = shortUrlEl.textContent;
            try {
                await navigator.clipboard.writeText(url);
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'Copy';
                    copyBtn.classList.remove('copied');
                }, 2000);
            } catch {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'Copy';
                    copyBtn.classList.remove('copied');
                }, 2000);
            }
        }
    </script>
</body>
</html>
